<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vokabel-Lernkartei: Russische Präpositionen & Verben</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --light-green: #e8f5e9;
            --accent-green: #4caf50;
            --dark-green: #1b5e20;
            --card-white: #ffffff;
            --text-color: #333;
            --shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-green);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: var(--dark-green);
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .progress {
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--primary-green);
            font-size: 1.1rem;
        }

        /* Flashcard 3D Flip */
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            height: 350px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: var(--shadow);
            border-radius: 20px;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            border-radius: 20px;
            background: var(--card-white);
            border: 2px solid var(--accent-green);
        }

        .flashcard-back {
            transform: rotateY(180deg);
            background-color: #f9fdf9;
        }

        .content {
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
            line-height: 1.4;
        }

        .side-label {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .utility-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background-color: var(--primary-green);
            color: white;
            transition: background 0.2s, transform 0.1s;
            font-weight: 600;
        }

        button:hover {
            background-color: var(--dark-green);
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background-color: var(--accent-green);
        }

        .btn-utility {
            background-color: #666;
            font-size: 0.9rem;
        }

        .keyboard-hint {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #777;
        }

        @media (max-width: 480px) {
            .flashcard-container {
                height: 300px;
            }
            h1 { font-size: 1.2rem; }
            button { padding: 10px 15px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Lernkartei: Russisch</h1>
    <div class="progress" id="progress-display">1 / 50</div>

    <div class="flashcard-container" id="card-container" onclick="flipCard()">
        <div class="flashcard" id="card">
            <div class="flashcard-face flashcard-front">
                <div class="side-label">Russisch</div>
                <div class="content" id="front-text">Lade...</div>
            </div>
            <div class="flashcard-face flashcard-back">
                <div class="side-label">Deutsch</div>
                <div class="content" id="back-text">Lade...</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevCard(event)">← Vorherige</button>
        <button onclick="nextCard(event)">Nächste →</button>
    </div>

    <div class="utility-buttons">
        <button class="btn-utility" onclick="shuffleCards()">Mischen</button>
        <button class="btn-utility" onclick="toStart()">An den Anfang</button>
    </div>

    <div class="keyboard-hint">
        Tastatur: Pfeiltasten für Navigation | Leertaste/Enter zum Umdrehen | Pos1 für Anfang
    </div>
</div>

<script>
    // Rohdaten der Vokabelliste
    const rawData = `
1. в – in, hinein (Ziel / Ort)
2. из – aus, von ... heraus (Herkunft)
3. на – auf, zu (Ziel / Ort bei Plätzen und Ereignissen)
4. с / со – von ... herab, von ... weg (Herkunft bei Plätzen und Ereignissen)
5. к / ко – zu (Ziel bei Personen)
6. от – von (Herkunft bei Personen)
7. у – bei (Ort bei Personen)
8. идти́ / пойти́ – gehen (zu Fuß)
9. е́хать / пое́ехать – fahren (mit einem Fahrzeug)
10. возвраща́ться / верну́ться – zurückkehren
11. приходи́ть / прийти́ – kommen, ankommen (zu Fuß)
12. приезжа́ть / прие́хать – kommen, ankommen (mit einem Fahrzeug)
13. уходи́ть / уйти́ – weggehen (zu Fuß)
14. уезжа́ть / уе́ехать – wegfahren
15. лежать / полежать – liegen
16. сиде́ть / посиде́ть – sitzen
17. шко́ла – Schule
18. библиоте́ка – Bibliothek
19. магази́н – Geschäft, Laden
20. теа́тр – Theater
21. университе́т – Universität
22. апте́ка – Apotheke
23. ры́нок – Markt
24. рабо́та – Arbeit
25. по́чта – Post
26. стадио́н – Stadion
27. парк – Park
28. кино́ – Kino
29. банк – Bank
30. институ́т – Institut
31. конце́рт – Konzert
32. ле́кция – Vorlesung
33. уро́к – Unterrichtsstunde, Lektion
34. вы́ставка – Ausstellung
35. встре́ча – Treffen
36. дом – Haus
37. домо́й – nach Hause
38. друг – Freund
39. подру́га – Freundin
40. врач – Arzt
41. брат – Bruder
42. сестра́ – Schwester
43. ма́ма – Mama
44. па́па – Papa
45. ба́бушка – Großmutter, Oma
46. де́душка – Großvater, Opa
47. роди́тели – Eltern
48. преподава́тель – Dozent, Lehrer
49. знако́мая – Bekannte
50. го́сти – Gäste (в го́сти – zu Besuch)`;

    let cards = [];
    let currentIndex = 0;

    // Daten parsen
    function parseData() {
        const lines = rawData.trim().split('\n');
        cards = lines.map(line => {
            // Entferne Nummerierung am Anfang
            const cleanLine = line.replace(/^\d+\.\s*/, '');
            // Trenne bei " – "
            const parts = cleanLine.split(' – ');
            return {
                front: parts[0]?.trim() || "",
                back: parts[1]?.trim() || ""
            };
        });
    }

    // Karte aktualisieren
    function updateCardDisplay() {
        const card = document.getElementById('card');
        const frontText = document.getElementById('front-text');
        const backText = document.getElementById('back-text');
        const progressDisplay = document.getElementById('progress-display');

        // Karte zurückdrehen bevor Inhalt wechselt
        card.classList.remove('is-flipped');

        setTimeout(() => {
            frontText.innerText = cards[currentIndex].front;
            backText.innerText = cards[currentIndex].back;
            progressDisplay.innerText = `${currentIndex + 1} / ${cards.length}`;
            
            adjustFontSize(frontText);
            adjustFontSize(backText);
        }, 150); 
    }

    // Schriftgröße dynamisch anpassen
    function adjustFontSize(element) {
        const length = element.innerText.length;
        if (length > 50) {
            element.style.fontSize = "1.1rem";
        } else if (length > 30) {
            element.style.fontSize = "1.4rem";
        } else {
            element.style.fontSize = "1.8rem";
        }
    }

    // Navigation
    function flipCard() {
        document.getElementById('card').classList.toggle('is-flipped');
    }

    function nextCard(event) {
        if(event) event.stopPropagation();
        currentIndex = (currentIndex + 1) % cards.length;
        updateCardDisplay();
    }

    function prevCard(event) {
        if(event) event.stopPropagation();
        currentIndex = (currentIndex - 1 + cards.length) % cards.length;
        updateCardDisplay();
    }

    function shuffleCards() {
        for (let i = cards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cards[i], cards[j]] = [cards[j], cards[i]];
        }
        currentIndex = 0;
        updateCardDisplay();
    }

    function toStart() {
        currentIndex = 0;
        updateCardDisplay();
    }

    // Keyboard Controls
    document.addEventListener('keydown', (e) => {
        switch(e.key) {
            case 'ArrowRight':
                nextCard();
                break;
            case 'ArrowLeft':
                prevCard();
                break;
            case ' ':
            case 'Enter':
                flipCard();
                break;
            case 'Home':
                toStart();
                break;
        }
    });

    // Initialisierung
    parseData();
    updateCardDisplay();

</script>

</body>
</html>
