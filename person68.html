<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russische Präpositionen: 16 Übungen</title>
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .instruction {
            background: #eef2f7;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 6px solid var(--accent-color);
            font-size: 1rem;
        }

        .exercise-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 600px) {
            .exercise-grid { grid-template-columns: 1fr 1fr; }
        }

        @media (min-width: 900px) {
            .exercise-grid { grid-template-columns: 1fr 1fr 1fr; }
        }

        .exercise-card {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 20px;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: box-shadow 0.3s, transform 0.2s;
        }

        .exercise-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .visual-icon {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .sentence {
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .translation {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 15px;
            font-style: italic;
            min-height: 40px;
            display: flex;
            align-items: center;
        }

        select {
            padding: 10px;
            font-size: 1.1rem;
            border-radius: 6px;
            border: 2px solid #ccc;
            font-weight: bold;
            width: 100%;
            max-width: 150px;
            outline: none;
            transition: all 0.3s;
            cursor: pointer;
            text-align: center;
        }

        /* Feedback-Farben */
        .correct {
            background-color: var(--success-color) !important;
            color: white !important;
            border-color: #1e8449 !important;
        }

        .incorrect {
            background-color: var(--error-color) !important;
            color: white !important;
            border-color: #922b21 !important;
        }

        .card-controls {
            margin-top: 15px;
            display: flex;
            gap: 8px;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: opacity 0.2s;
        }

        .btn-reset { background: #95a5a6; color: white; }
        .btn-solution { background: var(--accent-color); color: white; }
        button:hover { opacity: 0.9; }

        .global-controls {
            margin-top: 40px;
            text-align: center;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Person vs. Ort (16 Übungen)</h1>
    
    <div class="instruction">
        <strong>Grammatik-Check:</strong> <br>
        1. <strong>В / НА</strong> nutzt man für Orte, Gebäude oder Veranstaltungen. <br>
        2. <strong>К</strong> nutzt man für Personen. <br><br>
        Wähle die richtige Präposition. Das Feld zeigt sofort an, ob es stimmt (Grün) oder nicht (Rot).
    </div>

    <div id="exercise-list" class="exercise-grid"></div>

    <div class="global-controls">
        <button class="btn-reset" style="padding: 15px 30px; font-size: 1.1rem;" onclick="resetAll()">Alles zurücksetzen</button>
    </div>
</div>

<script>
    const exerciseData = [
        { id: 1, icon: '👨‍💼', prompt: "Я иду ... другу", trans: "Ich gehe zum Freund", prep: 'к' },
        { id: 2, icon: '🏟️', prompt: "Анна едет ... стадион", trans: "Anna fährt zum Stadion", prep: 'на' },
        { id: 3, icon: '👵', prompt: "Мы идём ... бабушке", trans: "Wir gehen zur Oma", prep: 'к' },
        { id: 4, icon: '🏤', prompt: "Студент идёт ... почту", trans: "Der Student geht zur Post", prep: 'на' },
        { id: 5, icon: '🎭', prompt: "Он едет ... театр", trans: "Er fährt ins Theater", prep: 'в' },
        { id: 6, icon: '👧', prompt: "Папа идёт ... сестре", trans: "Papa geht zur Schwester", prep: 'к' },
        { id: 7, icon: '🍎', prompt: "Мама едет ... рынок", trans: "Mama fährt zum Markt", prep: 'на' },
        { id: 8, icon: '👨‍⚕️', prompt: "Я иду ... врачу", trans: "Ich gehe zum Arzt", prep: 'к' },
        { id: 9, icon: '🖼️', prompt: "Она идёт ... выставku", trans: "Sie geht zur Ausstellung", prep: 'на' },
        { id: 10, icon: '🏥', prompt: "Максим едет ... больницу", trans: "Maxim fährt ins Krankenhaus", prep: 'в' },
        { id: 11, icon: '👦', prompt: "Мы идём ... брату", trans: "Wir gehen zum Bruder", prep: 'к' },
        { id: 12, icon: '🎓', prompt: "Лена едет ... университет", trans: "Lena fährt zur Universität", prep: 'в' },
        { id: 13, icon: '📚', prompt: "Виктор идёт ... библиотеку", trans: "Viktor geht in die Bibliothek", prep: 'в' },
        { id: 14, icon: '👨‍👩‍👧‍👦', prompt: "Я еду ... родителям", trans: "Ich fahre zu den Eltern", prep: 'к' },
        { id: 15, icon: '📝', prompt: "Мы идём ... урок", trans: "Wir gehen zum Unterricht", prep: 'на' },
        { id: 16, icon: '👴', prompt: "Она едет ... дедушке", trans: "Sie fährt zum Opa", prep: 'к' }
    ];

    const listContainer = document.getElementById('exercise-list');

    function init() {
        listContainer.innerHTML = '';
        exerciseData.forEach(ex => {
            const card = document.createElement('div');
            card.className = 'exercise-card';
            card.innerHTML = `
                <div class="visual-icon">${ex.icon}</div>
                <div class="sentence">${ex.prompt}</div>
                <div class="translation">${ex.trans}</div>
                <select id="select-${ex.id}" onchange="checkAnswer(${ex.id}, '${ex.prep}')">
                    <option value="">-- ? --</option>
                    <option value="в">В</option>
                    <option value="на">НА</option>
                    <option value="к">К</option>
                </select>
                <div class="card-controls">
                    <button class="btn-solution" onclick="showSolution(${ex.id}, '${ex.prep}')">Lösung</button>
                    <button class="btn-reset" onclick="resetOne(${ex.id})">Reset</button>
                </div>
            `;
            listContainer.appendChild(card);
        });
    }

    window.checkAnswer = function(id, correct) {
        const select = document.getElementById(`select-${id}`);
        if (select.value === "") {
            select.className = "";
        } else if (select.value === correct) {
            select.className = "correct";
        } else {
            select.className = "incorrect";
        }
    };

    window.showSolution = function(id, correct) {
        const select = document.getElementById(`select-${id}`);
        select.value = correct;
        select.className = "correct";
    };

    window.resetOne = function(id) {
        const select = document.getElementById(`select-${id}`);
        select.value = "";
        select.className = "";
    };

    window.resetAll = function() {
        init();
    };

    // Start
    init();
</script>

</body>
</html>
