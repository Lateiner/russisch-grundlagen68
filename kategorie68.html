<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategorisierung: КУДА? ГДЕ? ОТКУДА?</title>
    <!-- Polyfill für Drag & Drop auf Touch-Geräten -->
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            font-size: 1.6rem;
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .instruction {
            background: #eef2f7;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent-color);
            font-size: 0.95rem;
        }

        /* Source Pool */
        .item-pool {
            background: #fdfdfd;
            border: 2px dashed #cbd5e0;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            min-height: 100px;
            margin-bottom: 30px;
        }

        .draggable {
            background: var(--accent-color);
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: grab;
            user-select: none;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            touch-action: none;
            font-size: 1rem;
            transition: transform 0.2s;
        }

        .draggable:active { cursor: grabbing; transform: scale(1.05); }

        /* Drop Zones Layout */
        .drop-zones-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .drop-box {
            background: #fff;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            transition: background 0.3s;
        }

        .drop-box h2 {
            font-size: 1.1rem;
            margin-bottom: 5px;
            color: var(--primary-color);
        }

        .drop-box .translation {
            font-size: 0.8rem;
            color: #718096;
            margin-bottom: 15px;
        }

        .drop-box.drag-over {
            background: #ebf8ff;
            border-color: var(--accent-color);
        }

        /* Feedback Colors in Drop Box */
        .draggable.correct { background-color: var(--success-color); }
        .draggable.incorrect { background-color: var(--error-color); }

        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        .btn-reset { background: #718096; color: white; }
        .btn-solution { background: var(--accent-color); color: white; }
        button:hover { opacity: 0.9; }

        /* Responsive */
        @media (max-width: 768px) {
            .drop-zones-container { grid-template-columns: 1fr; }
            .drop-box { min-height: 150px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Kategorisierung: Wohin? Wo? Woher?</h1>
    
    <div class="instruction">
        <strong>Anleitung:</strong> Ziehe die russischen Ausdrücke in die richtige Box. 
        Das Feld färbt sich sofort <strong>grün</strong> (richtig) oder <strong>rot</strong> (falsch).
    </div>

    <!-- Items to be sorted -->
    <div class="item-pool" id="pool" ondrop="dropToPool(event)" ondragover="allowDrop(event)">
        <!-- Draggables generated by JS -->
    </div>

    <!-- Sorting Boxes -->
    <div class="drop-zones-container">
        <!-- Box: Kuda -->
        <div class="drop-box" id="box-kuda" data-category="kuda" ondrop="dropToBox(event)" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)">
            <h2>КУДА?</h2>
            <span class="translation">(Wohin? / Richtung)</span>
        </div>

        <!-- Box: Gde -->
        <div class="drop-box" id="box-gde" data-category="gde" ondrop="dropToBox(event)" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)">
            <h2>ГДЕ?</h2>
            <span class="translation">(Wo? / Ort)</span>
        </div>

        <!-- Box: Otkuda -->
        <div class="drop-box" id="box-otkuda" data-category="otkuda" ondrop="dropToBox(event)" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)">
            <h2>ОТКУДА?</h2>
            <span class="translation">(Woher? / Herkunft)</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn-reset" onclick="resetExercise()">Zurücksetzen</button>
        <button class="btn-solution" onclick="showSolution()">Lösung anzeigen</button>
    </div>
</div>

<script>
    const itemsData = [
        { text: "в парк", cat: "kuda" },
        { text: "на работу", cat: "kuda" },
        { text: "к врачу", cat: "kuda" },
        { text: "в школу", cat: "kuda" },
        { text: "в парке", cat: "gde" },
        { text: "на работе", cat: "gde" },
        { text: "у врача", cat: "gde" },
        { text: "в школе", cat: "gde" },
        { text: "из парка", cat: "otkuda" },
        { text: "с работы", cat: "otkuda" },
        { text: "от врача", cat: "otkuda" },
        { text: "из школы", cat: "otkuda" }
    ];

    function init() {
        const pool = document.getElementById('pool');
        pool.innerHTML = '';
        
        // Clear boxes
        document.querySelectorAll('.drop-box').forEach(box => {
            const title = box.querySelector('h2');
            const trans = box.querySelector('.translation');
            box.innerHTML = '';
            box.appendChild(title);
            box.appendChild(trans);
        });

        // Shuffle and create items
        const shuffled = [...itemsData].sort(() => Math.random() - 0.5);
        shuffled.forEach((item, index) => {
            const el = document.createElement('div');
            el.className = 'draggable';
            el.draggable = true;
            el.id = 'item-' + index;
            el.innerText = item.text;
            el.dataset.cat = item.cat;
            el.addEventListener('dragstart', dragStart);
            pool.appendChild(el);
        });
    }

    function dragStart(e) {
        e.dataTransfer.setData('text/plain', e.target.id);
    }

    function allowDrop(e) {
        e.preventDefault();
    }

    function dragEnter(e) {
        const box = e.target.closest('.drop-box');
        if (box) box.classList.add('drag-over');
    }

    function dragLeave(e) {
        const box = e.target.closest('.drop-box');
        if (box) box.classList.remove('drag-over');
    }

    function dropToBox(e) {
        e.preventDefault();
        const box = e.target.closest('.drop-box');
        box.classList.remove('drag-over');
        
        const id = e.dataTransfer.getData('text/plain');
        const el = document.getElementById(id);
        
        box.appendChild(el);
        checkItem(el, box.dataset.category);
    }

    function dropToPool(e) {
        e.preventDefault();
        const pool = document.getElementById('pool');
        const id = e.dataTransfer.getData('text/plain');
        const el = document.getElementById(id);
        
        el.classList.remove('correct', 'incorrect');
        pool.appendChild(el);
    }

    function checkItem(el, category) {
        el.classList.remove('correct', 'incorrect');
        if (el.dataset.cat === category) {
            el.classList.add('correct');
        } else {
            el.classList.add('incorrect');
        }
    }

    function resetExercise() {
        init();
    }

    function showSolution() {
        const items = document.querySelectorAll('.draggable');
        items.forEach(el => {
            const targetBox = document.querySelector(`.drop-box[data-category="${el.dataset.cat}"]`);
            el.classList.remove('incorrect');
            el.classList.add('correct');
            targetBox.appendChild(el);
        });
    }

    // Start
    window.onload = init;
</script>

</body>
</html>
