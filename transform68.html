<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformations-Training: Russische Präpositionen</title>
    <!-- Polyfill für Drag & Drop/Touch-Geräte -->
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            font-size: 1.6rem;
            color: var(--primary-color);
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .instruction {
            background: #eef2f7;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 5px solid var(--accent-color);
            font-size: 0.95rem;
        }

        .logic-hint {
            display: flex;
            justify-content: space-around;
            background: #fff;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .exercise-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .exercise-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .exercise-card {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 15px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .start-sentence {
            background: #f8f9fa;
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #555;
            text-align: center;
        }

        .target-sentence {
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 15px;
            line-height: 2.2;
        }

        select {
            padding: 5px;
            font-size: 1rem;
            border-radius: 4px;
            border: 2px solid #ccc;
            outline: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        /* Feedback Styles */
        .correct {
            background-color: var(--success-color) !important;
            color: white !important;
            border-color: #1e8449 !important;
        }

        .incorrect {
            background-color: var(--error-color) !important;
            color: white !important;
            border-color: #922b21 !important;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: opacity 0.2s;
        }

        .btn-reset { background: #95a5a6; color: white; }
        .btn-solution { background: var(--accent-color); color: white; }
        button:hover { opacity: 0.9; }

        .global-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Transformations-Training</h1>
    
    <div class="instruction">
        <strong>Anleitung:</strong> Verwandle den Satz von „Wo?“ (Standort) zu „Woher?“ (Herkunft). 
        Wähle die passende <strong>Präposition</strong> und die richtige <strong>Endung</strong> für das Wort aus. 
        Das System gibt dir sofort Feedback (Grün = richtig, Rot = falsch).
    </div>

    <div class="logic-hint">
        <span>В &rarr; ИЗ</span>
        <span>НА &rarr; С</span>
        <span>У &rarr; ОТ</span>
    </div>

    <div id="exercise-list" class="exercise-grid">
        <!-- JS generiert 16 Aufgaben -->
    </div>

    <div class="global-footer">
        <button class="btn-reset" style="padding: 12px 25px;" onclick="resetAll()">Alle Übungen zurücksetzen</button>
    </div>
</div>

<script>
    const exerciseData = [
        { id: 1, start: "Я в театре.", target: "Я иду", prep: "из", noun: "театр", ending: "а", optionsEnding: ["а", "ы", "у"] },
        { id: 2, start: "Я на почте.", target: "Я иду", prep: "с", noun: "почт", ending: "ы", optionsEnding: ["ы", "а", "е"] },
        { id: 3, start: "Я у врача.", target: "Я иду", prep: "от", noun: "врач", ending: "а", optionsEnding: ["а", "у", "я"] },
        { id: 4, start: "Я в школе.", target: "Я иду", prep: "из", noun: "школ", ending: "ы", optionsEnding: ["ы", "а", "е"] },
        { id: 5, start: "Я на уроке.", target: "Я иду", prep: "с", noun: "урок", ending: "а", optionsEnding: ["а", "е", "у"] },
        { id: 6, start: "Я у сестры.", target: "Я иду", prep: "от", noun: "сестр", ending: "ы", optionsEnding: ["ы", "е", "а"] },
        { id: 7, start: "Я в магазине.", target: "Я иду", prep: "из", noun: "магазин", ending: "а", optionsEnding: ["а", "у", "е"] },
        { id: 8, start: "Я на стадионе.", target: "Я иду", prep: "с", noun: "стадион", ending: "а", optionsEnding: ["а", "у", "е"] },
        { id: 9, start: "Я у бабушки.", target: "Я иду", prep: "от", noun: "бабушк", ending: "и", optionsEnding: ["и", "ы", "е"] },
        { id: 10, start: "Я в парке.", target: "Я иду", prep: "из", noun: "парк", ending: "а", optionsEnding: ["а", "у", "е"] },
        { id: 11, start: "Я на концерte.", target: "Я иду", prep: "с", noun: "концерт", ending: "а", optionsEnding: ["а", "у", "е"] },
        { id: 12, start: "Я у брата.", target: "Я иду", prep: "от", noun: "брат", ending: "а", optionsEnding: ["а", "у", "я"] },
        { id: 13, start: "Я в банке.", target: "Я иду", prep: "из", noun: "банк", ending: "а", optionsEnding: ["а", "у", "е"] },
        { id: 14, start: "Я на работе.", target: "Я иду", prep: "с", noun: "работ", ending: "ы", optionsEnding: ["ы", "а", "е"] },
        { id: 15, start: "Я у подруги.", target: "Я иду", prep: "от", noun: "подруг", ending: "и", optionsEnding: ["и", "ы", "е"] },
        { id: 16, start: "Я в аптеке.", target: "Я иду", prep: "из", noun: "аптек", ending: "и", optionsEnding: ["и", "а", "е"] }
    ];

    const container = document.getElementById('exercise-list');

    function init() {
        container.innerHTML = '';
        exerciseData.forEach(ex => {
            const card = document.createElement('div');
            card.className = 'exercise-card';
            
            card.innerHTML = `
                <div class="start-sentence">„${ex.start}“</div>
                <div class="target-sentence">
                    ${ex.target} 
                    <select id="prep-${ex.id}" onchange="check(${ex.id})">
                        <option value="">--</option>
                        <option value="из">из</option>
                        <option value="с">с</option>
                        <option value="от">от</option>
                    </select> 
                    ${ex.noun}<select id="end-${ex.id}" onchange="check(${ex.id})">
                        <option value="">-?</option>
                        ${ex.optionsEnding.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                    </select>.
                </div>
                <div class="controls">
                    <button class="btn-solution" onclick="showSolution(${ex.id})">Lösung</button>
                    <button class="btn-reset" onclick="resetOne(${ex.id})">Reset</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    window.check = function(id) {
        const ex = exerciseData.find(e => e.id === id);
        const prepEl = document.getElementById(`prep-${id}`);
        const endEl = document.getElementById(`end-${id}`);

        if (prepEl.value !== "") {
            prepEl.className = prepEl.value === ex.prep ? 'correct' : 'incorrect';
        } else {
            prepEl.className = '';
        }

        if (endEl.value !== "") {
            endEl.className = endEl.value === ex.ending ? 'correct' : 'incorrect';
        } else {
            endEl.className = '';
        }
    };

    window.showSolution = function(id) {
        const ex = exerciseData.find(e => e.id === id);
        const prepEl = document.getElementById(`prep-${id}`);
        const endEl = document.getElementById(`end-${id}`);

        prepEl.value = ex.prep;
        prepEl.className = 'correct';
        
        endEl.value = ex.ending;
        endEl.className = 'correct';
    };

    window.resetOne = function(id) {
        const prepEl = document.getElementById(`prep-${id}`);
        const endEl = document.getElementById(`end-${id}`);
        
        prepEl.value = "";
        prepEl.className = "";
        
        endEl.value = "";
        endEl.className = "";
    };

    window.resetAll = function() {
        init();
    };

    init();
</script>

</body>
</html>
